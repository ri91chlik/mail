{% extends "mail/layout.html" %}
{% load static %}

{% block body %}
    <h2>{{ request.user.email }}</h2>

    <button class="btn btn-sm btn-outline-primary" id="inbox">Inbox</button>
    <button class="btn btn-sm btn-outline-primary" id="compose">Compose</button>
    <button class="btn btn-sm btn-outline-primary" id="sent">Sent</button>
    <button class="btn btn-sm btn-outline-primary" id="archived">Archived</button>
    <a class="btn btn-sm btn-outline-primary" href="{% url 'logout' %}">Log Out</a>
    <hr>


    
    <div id="emails-view">
    </div>

    <div id='emails-content-view'>
    </div>

    

    

    <div id="compose-view">
        <h3>New Email</h3>
        <form id="compose-form">

            <table class="table">
                From:
                <tr>
                   
                    <div class="form-group">
                        <td> <input disabled class="form-control" value="{{ request.user.email }}"></td>
                    </div>
                    
                </tr>
            </table>
            <table class="table">
                To:    
                <tr>
                   
                    <div class="form-group">
                        <td> <input id="compose-recipients" class="form-control"></td>
                    </div>
                    
                </tr>
            </table><br>
            <table class="table">
                <tr>
                    <div class="form-group">
                        <input class="form-control" id="compose-subject" placeholder="Subject">
                    </div>
                </tr>
            </table><br>
            <span>
                <tr>
                    <textarea class="form-control" id="compose-body" placeholder="Body"></textarea><br>
                    <input type="submit" class="btn btn-primary" placeholder="send"/>
                </tr>
            </span>
        </form>
    </div>
{% endblock %}

{% block script %}
    <script src="{% static 'mail/inbox.js' %}"></script>
{% endblock %}
